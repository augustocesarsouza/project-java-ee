<!DOCTYPE html>
<ui:composition template="/WEB-INF/templates/default.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui">

    <f:metadata>
        <f:viewAction action="#{sessionBean.ensureGuest}" />
    </f:metadata>

    <ui:define name="title">Login</ui:define>

    <ui:define name="content">
        <div class="auth-wrapper">
            <p:panel header="Entrar no sistema" styleClass="auth-panel">
                <h:form prependId="false">
                    <p:messages showDetail="true" closable="true" />

                    <div class="form-field">
                        <p:outputLabel for="email" value="E-mail" />
                        <p:inputText id="email"
                                     value="#{loginBean.email}"
                                     required="true"
                                     requiredMessage="Informe o e-mail." />
                    </div>

                    <div class="form-field">
                        <p:outputLabel for="password" value="Senha" />
                        <p:password id="password"
                                    value="#{loginBean.password}"
                                    feedback="false"
                                    required="true"
                                    requiredMessage="Informe a senha." />
                    </div>

                    <p:commandButton value="Entrar"
                                     action="#{loginBean.login}"
                                     ajax="false"
                                     styleClass="full-width-button" />

                    <div class="helper-links">
                        <span>Primeiro acesso?</span>
                        <h:link outcome="/register" value="Criar conta" />
                    </div>
                </h:form>
            </p:panel>
        </div>
    </ui:define>
</ui:composition>
