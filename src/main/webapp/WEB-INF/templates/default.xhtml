<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><ui:insert name="title">Portal Base EE</ui:insert></title>
    <h:outputStylesheet library="css" name="app.css" />
</h:head>
<h:body styleClass="app-body">
    <div class="layout-shell">
        <header class="topbar">
            <h:link outcome="/index" value="Portal Base EE" styleClass="brand" />

            <h:panelGroup rendered="#{sessionBean.loggedIn}" layout="block" styleClass="topbar-actions">
                <span class="user-badge">#{sessionBean.userName}</span>
                <h:form>
                    <p:commandButton value="Sair"
                                     action="#{sessionBean.logout}"
                                     ajax="false"
                                     styleClass="ui-button-secondary ui-button-outlined" />
                </h:form>
            </h:panelGroup>
        </header>

        <main class="content-shell">
            <ui:insert name="content" />
        </main>
    </div>
</h:body>
</html>
